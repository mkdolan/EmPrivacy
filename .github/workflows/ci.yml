name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emdash_version:
          - 0.5.0
          - 0.7.0
    name: test (emdash@${{ matrix.emdash_version }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm install --no-save emdash@${{ matrix.emdash_version }}
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run verify:exports
      - run: npm run audit
